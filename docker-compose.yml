version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: local_postgres_test
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
    ports:
      - "5432:5432"
    volumes:
      - ./db/01_migrations/01_init.sql:/docker-entrypoint-initdb.d/01_migrations
      - ./db/02_seeds/02_seed.sql:/docker-entrypoint-initdb.d/02_seeds
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
